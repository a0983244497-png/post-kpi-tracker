<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發文工作台｜重心開始</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ===== TOKENS ===== */
:root{
  --bg:#EDE8DF;
  --surface:#F5F0E8;
  --surface-2:#FDFAF5;
  --surface-0:rgba(58,32,16,.04);
  --brown:#3A2010;
  --brown-mid:#7A4A2A;
  --brick:#B8531A;
  --brick-light:#E8906A;
  --sand:#D4B896;
  --sand-light:#EAD9C4;
  --text:#3A2010;
  --text-mid:rgba(58,32,16,.6);
  --text-muted:rgba(58,32,16,.35);
  --border:rgba(58,32,16,.1);
  --border-strong:rgba(58,32,16,.2);
  --border-accent:#B8531A;
  --bg-accent:rgba(184,83,26,.06);
  --radius:10px;
  --radius-sm:6px;
  --font:'Noto Sans TC',sans-serif;
  --font-display:'Montserrat',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh}

/* ===== HEADER ===== */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--brick);letter-spacing:.1em;text-transform:uppercase}
.logo-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.pw-input{font-size:12px;padding:5px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:160px;outline:none}
.pw-input:focus{border-color:var(--brick)}
.conn-status{font-size:11px;display:flex;align-items:center;gap:5px;color:var(--text-muted)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--border-strong)}
.conn-dot.live{background:#4CAF50}

/* ===== LAYOUT ===== */
.layout{min-height:calc(100vh - 56px)}
.left{padding:1.5rem 2rem}

/* ===== WEEK NAV ===== */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.wnav-btn{background:none;border:1px solid var(--border-strong);color:var(--brown-mid);width:30px;height:30px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.wnav-btn:hover{background:var(--sand-light)}
.week-label{font-size:13px;font-weight:500;color:var(--text);min-width:130px;text-align:center}
.refresh-btn{margin-left:auto;font-size:12px;padding:5px 12px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:none;color:var(--brown-mid);cursor:pointer;font-family:var(--font)}
.refresh-btn:hover{background:var(--sand-light)}

/* ===== CALENDAR GRID ===== */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:10px;min-height:100px;cursor:pointer;transition:border-color .15s;position:relative}
.day-card:hover{border-color:var(--border-strong)}
.day-card.today{border:1.5px solid var(--border-accent)}
.day-card.empty-day{background:transparent;border-style:dashed;cursor:default;pointer-events:none;opacity:.3}
.day-card.other-month{opacity:.15;pointer-events:none;cursor:default}
.day-card.done{opacity:.4}
.day-card.selected{border-color:var(--border-accent);background:var(--bg-accent)}
.day-card.selected .acc-arrow{transform:rotate(180deg)}
.day-name{font-size:10px;color:var(--text-muted);font-weight:500;margin-bottom:2px}
.day-num{font-size:18px;font-weight:500;color:var(--text);line-height:1;margin-bottom:6px}
.day-num.today-num{color:var(--brick)}
.today-pip{width:5px;height:5px;border-radius:50%;background:var(--brick);display:inline-block;margin-left:4px;vertical-align:middle}
.type-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;margin-bottom:5px}
.b-single{background:#FEF0E0;color:#8A4A08}
.b-carousel{background:#E6F0FE;color:#1A4A8A}
.b-cta{background:#E6F5EE;color:#1A6A3A}
.b-done{background:var(--bg);color:var(--text-muted)}
.day-topic{font-size:11px;color:var(--text-mid);line-height:1.4;padding-right:14px}
.acc-arrow{position:absolute;bottom:6px;right:7px;font-size:11px;color:var(--text-muted);transition:transform .25s;line-height:1}

/* ===== ACCORDION ===== */
.acc-wrap{grid-column:1/-1;overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.acc-wrap.open{max-height:560px}
.acc-inner{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);margin:2px 0 6px;overflow:hidden;display:flex;flex-direction:column}
.acc-hdr{padding:14px 16px 0;flex-shrink:0}
.acc-series{font-size:10px;color:var(--brick);letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.acc-title-txt{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.35}
.acc-date-meta{font-size:11px;color:var(--text-muted);margin-bottom:10px}
.acc-body{height:340px;overflow-y:auto;padding:0 16px 12px}
.acc-body::-webkit-scrollbar{width:4px}
.acc-body::-webkit-scrollbar-track{background:transparent}
.acc-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.acc-body .caption-area{background:var(--surface-0);margin-bottom:0}
.acc-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}

/* ===== RIGHT PANEL ===== */
.panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;gap:8px;text-align:center}
.panel-empty-icon{font-size:32px;opacity:.3}
.panel-header{margin-bottom:1.25rem}
.panel-series{font-size:10px;color:var(--brick);letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:6px}
.panel-title{font-size:17px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:4px}
.panel-meta{font-size:12px;color:var(--text-muted)}
.panel-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.ptab{font-size:13px;padding:7px 16px;cursor:pointer;border:none;background:none;color:var(--text-mid);font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-1px}
.ptab.on{color:var(--brick);border-bottom-color:var(--brick);font-weight:500}
.pane{display:none}
.pane.on{display:block}

/* ===== CAPTION PANE ===== */
.caption-area{font-size:13px;color:var(--text);line-height:1.9;white-space:pre-wrap;background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;min-height:120px;margin-bottom:10px}
.caption-loading{font-size:13px;color:var(--text-muted);padding:16px;text-align:center}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:none;color:var(--text);cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.btn:hover{background:var(--sand-light)}
.btn-primary{background:var(--brick);border-color:var(--brick);color:#fff;font-weight:500}
.btn-primary:hover{background:#9A3F0E}

/* ===== IMAGE PANE ===== */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 0;min-height:80px}
.img-thumb-card{aspect-ratio:4/5;position:relative;border-radius:6px;overflow:hidden;border:2px solid var(--border);background:var(--surface-0);cursor:default;transition:border-color .15s}
.img-thumb-card.ready{cursor:zoom-in;border-color:var(--border-strong)}
.img-thumb-card.ready:hover{border-color:var(--brick-light)}
.img-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-muted);opacity:.5}
.img-thumb-card img{width:100%;height:100%;object-fit:cover;display:block}
.img-thumb-num{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;font-family:var(--font-display);font-weight:700;padding:2px 5px;border-radius:3px;pointer-events:none}
.img-thumb-dl{position:absolute;bottom:4px;right:4px;background:var(--brick);color:#fff;border:none;font-size:11px;padding:3px 7px;border-radius:3px;cursor:pointer;opacity:0;transition:opacity .15s;font-weight:700}
.img-thumb-card.ready:hover .img-thumb-dl{opacity:1}
.img-grid-msg{padding:16px 0;text-align:center;color:var(--text-muted);font-size:12px;grid-column:1/-1}

/* ===== SLIDE GEN (1080×1350, off-screen) ===== */
#slide-gen-wrap{position:fixed;left:-2000px;top:0;width:1080px;height:1350px;overflow:hidden;pointer-events:none}

/* ===== ERR / LOADING ===== */
.err-box{font-size:13px;color:#8A2010;background:#FEE8E4;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:1rem}
.loading-msg{font-size:13px;color:var(--text-muted);padding:2rem;text-align:center}

/* ===== VIEW TOGGLE ===== */
.view-toggle{display:flex;border:1px solid var(--border-strong);border-radius:var(--radius-sm);overflow:hidden;margin-left:8px;flex-shrink:0}
.vtab{font-size:12px;padding:4px 11px;border:none;background:none;color:var(--brown-mid);cursor:pointer;font-family:var(--font);font-weight:500;transition:background .15s,color .15s}
.vtab.on{background:var(--brick);color:#fff}
.vtab:not(.on):hover{background:var(--sand-light)}

/* ===== MONTH HEADERS ===== */
.month-day-hdrs{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px}
.month-day-hdr{text-align:center;font-size:11px;color:var(--text-muted);font-weight:500;padding:4px 0}

/* ===== LIGHTBOX ===== */
#carousel-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
#carousel-lightbox.on{display:flex}
#lightbox-img{max-width:min(90vw,540px);max-height:90vh;border-radius:var(--radius);box-shadow:0 8px 40px rgba(0,0,0,.5);display:block}
.day-selector{white-space:normal}
.day-selector-item{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:6px;background:var(--surface-2);border:1px solid var(--border)}
.day-selector-item:hover{border-color:var(--brick-light);background:#FEF6F0}
.day-selector-name{font-size:12px;font-weight:500;color:var(--text);margin-top:4px}
.day-selector-meta{font-size:11px;color:var(--text-muted);margin-top:2px}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .cal-grid{grid-template-columns:repeat(4,1fr)}
  .acc-body{height:380px}
  .acc-wrap.open{max-height:800px}
  .left{padding:1rem}
  .header{padding:0 1rem}
  .img-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="logo">重心開始</div>
    <div class="logo-sub">發文工作台</div>
  </div>
  <div class="header-right">
    <input type="password" class="pw-input" id="pw-input" placeholder="TEAM_PASSWORD" autocomplete="off">
    <button class="refresh-btn" onclick="loadData()">載入 ↻</button>
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">未連線</span>
    </div>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="week-nav">
      <button class="wnav-btn" onclick="changeNav(-1)">&#8592;</button>
      <div class="week-label" id="week-label">—</div>
      <button class="wnav-btn" onclick="changeNav(1)">&#8594;</button>
      <div class="view-toggle">
        <button class="vtab on" id="vtab-week" onclick="setView('week')">週</button>
        <button class="vtab" id="vtab-month" onclick="setView('month')">月</button>
      </div>
      <button class="refresh-btn" onclick="loadData()">重新整理</button>
    </div>
    <div id="cal-wrap">
      <div class="loading-msg">輸入密碼後按「載入」</div>
    </div>
  </div>
</div>

<!-- Slide gen container (1080×1350, off-screen) -->
<div id="slide-gen-wrap"></div>

<!-- Lightbox -->
<div id="carousel-lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="" style="max-width:min(90vw,540px);max-height:90vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.5);display:block">
</div>

<script>
// ===== CONFIG =====
// TODO（夥伴5）：把這裡換成實際部署的網址
const API_BASE = 'https://post-kpi-tracker-production.up.railway.app';
// TODO（夥伴5）：Claude API 呼叫改成透過後端轉發
// POST /api/claude-proxy  body: {system, prompt} → 回傳 {text}
const CLAUDE_PROXY = '/api/claude-proxy';

// ===== SOP SYSTEM PROMPT =====
const SOP_SYSTEM = `你是 Gino（@yusheng.zhu.14）的 Threads 文案助理，品牌名稱「重心開始」。

【身份設定】
Gino 是黃金日內交易講師，有 2.5 年交易經驗，之前開過餐廳。語氣像在跟朋友聊天，偶爾帶乾話感，不裝專業、不說教。

【慣用詞與語感】
直接照用這些詞：
「好家在我有設停損」「這把直接被掃光」「二話不說直接反手」「行情在來回刷」「拿好拿滿」「兄弟姊妹們」「各位恭喜」「真的好家在」「差點中風」「被兩頭雙巴」「空單拿好拿滿」「脆友們」「硬做」「被洗出去」

【語氣規則】
- 口語、直接，像在跟朋友說話
- 不用成語、不用書面語、不用翻譯腔
- 禁止：「我們一起」「迎來改變」「意味著」「解決方案」「照出你最真實的樣子」「蛻變」「成就更好的自己」
- 數字要具體（不說「很多點」，說「60 點」）
- 偶爾用疊字 emoji（🤣🤣🤣 / 😍😍 / 🥲）但不超過一組

【參考範本（一定要照這個語感）】
範本一：
早上做黃金真的被洗到差點中風 🥲
行情在 4497-4479 來回刷，早盤先走了一張空單去試，結果直接被市場無情掃損，約莫中午看盤面一轉直接往上噴突破 4497，我二話不說直接反手。

範本二：
真的好家在上週黃金多單有在 4560 停利出場！上週五一度衝到 4595 以為要一飛沖天，結果被打回原形。這週在數據開牌打破僵局前，預計行情會在 4546 到 4490 之間反覆洗盤。硬做很容易被兩頭雙巴。

範本三：
溫馨提醒：黃金明天後天還會震盪，美元要注意 99.5 會不會被衝破。
對了！今天這樣震盪，各位還活著嗎？

【內容類型輸出格式】

carousel（輪播）：
產出 6 張內容，格式如下——

第1張｜封面
標題：（10字以內，強烈、有畫面、不說教）
正文：（50字以內，點出這篇要講什麼，口語）

第2–5張｜內容
標題：（每張一個重點，10字以內）
正文：（80–120字，至少一個具體數字或場景，照 Gino 語感）

第6張｜收尾互動
標題：（一句問句或乾話）
正文：（引導留言或私訊，不要太銷售感）

每張結尾加：＊以上為個人操作習慣，非投資建議

cta（行動呼籲）：
Hook（25字以內）
空行
本文（60–100字，帶出群組或課程價值，說實際不賣夢）
空行
行動指令（私訊「關鍵字」或連結在限動）
空行
＊以上為個人操作習慣，非投資建議

【禁止事項】
- 禁止：保證獲利、穩賺、零風險、保本、月入XX萬
- 禁止：「你是否曾經」「很多人都」「照出你最真實的樣子」開場
- 禁止：勵志收尾（不要「相信自己」「堅持下去」「蛻變」）
- 禁止：翻譯腔和過度書面用語
- 禁止：Hook/本文/結尾這些結構標籤出現在輸出內容裡`;

// ===== STATE =====
let pw = '';
let viewMode = 'week';
let curDate = new Date();
let curMonthDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let eventsCache = [];
let monthEventsCache = [];
let selEvent = null;
let selDate = null;
let generatedCaption = '';
let carouselCanvases = [];

// ===== UTILS =====
function weekStart(d) {
  const day = new Date(d);
  const diff = day.getDay() === 0 ? -6 : 1 - day.getDay();
  day.setDate(day.getDate() + diff);
  return day;
}
function fmtISO(d) { return d.toISOString().split('T')[0]; }
function fmtDisplay(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
const DAY_NAMES = ['週日','週一','週二','週三','週四','週五','週六'];
const TYPE_LABEL = {single:'單篇',carousel:'輪播',cta:'CTA'};
const TYPE_BADGE = {single:'b-single',carousel:'b-carousel',cta:'b-cta'};

function setConn(live, msg) {
  document.getElementById('conn-dot').className = 'conn-dot' + (live ? ' live' : '');
  document.getElementById('conn-label').textContent = msg;
}

// ===== VIEW CONTROL =====
function setView(mode) {
  if (mode === 'month') {
    curMonthDate = new Date(curDate.getFullYear(), curDate.getMonth(), 1);
  } else {
    curDate = new Date(curMonthDate.getFullYear(), curMonthDate.getMonth(), 1);
  }
  viewMode = mode;
  document.getElementById('vtab-week').classList.toggle('on', mode === 'week');
  document.getElementById('vtab-month').classList.toggle('on', mode === 'month');
  loadData();
}

function loadData() {
  if (viewMode === 'month') loadMonth();
  else loadWeek();
}

function changeNav(dir) {
  if (viewMode === 'month') {
    curMonthDate = new Date(curMonthDate.getFullYear(), curMonthDate.getMonth() + dir, 1);
  } else {
    curDate = new Date(curDate.getTime() + dir * 7 * 86400000);
  }
  loadData();
}

// ===== LOAD WEEK =====
async function loadWeek() {
  pw = document.getElementById('pw-input').value.trim();
  if (!pw) { setConn(false, '請輸入密碼'); return; }
  setConn(false, '連線中…');
  document.getElementById('cal-wrap').innerHTML = '<div class="loading-msg">載入中…</div>';
  closeAllAccordions();
  const ws = weekStart(curDate);
  const iso = fmtISO(ws);
  document.getElementById('week-label').textContent =
    `${fmtDisplay(ws)} – ${fmtDisplay(new Date(ws.getTime()+6*86400000))}`;
  try {
    const res = await fetch(`${API_BASE}/api/content-calendar/events?week=${iso}`, {
      headers: { Authorization: 'Basic ' + btoa(':' + pw) }
    });
    if (res.status === 401) { setConn(false,'密碼錯誤'); document.getElementById('cal-wrap').innerHTML='<div class="err-box">密碼錯誤</div>'; return; }
    if (!res.ok) throw new Error(res.status);
    eventsCache = await res.json();
    if (!Array.isArray(eventsCache)) eventsCache = eventsCache.events || [];
    setConn(true, '已連線');
    renderCalendar(ws);
  } catch(e) {
    setConn(false,'連線失敗');
    document.getElementById('cal-wrap').innerHTML = `<div class="err-box">無法連線：${e.message}</div>`;
  }
}

// ===== LOAD MONTH =====
async function loadMonth() {
  pw = document.getElementById('pw-input').value.trim();
  if (!pw) { setConn(false, '請輸入密碼'); return; }
  setConn(false, '連線中…');
  document.getElementById('cal-wrap').innerHTML = '<div class="loading-msg">載入中…</div>';
  closeAllAccordions();
  const y = curMonthDate.getFullYear();
  const mo = String(curMonthDate.getMonth() + 1).padStart(2, '0');
  const monthStr = `${y}-${mo}`;
  document.getElementById('week-label').textContent = `${y} 年 ${curMonthDate.getMonth() + 1} 月`;
  try {
    const res = await fetch(`${API_BASE}/api/content-calendar/events?month=${monthStr}`, {
      headers: { Authorization: 'Basic ' + btoa(':' + pw) }
    });
    if (res.status === 401) { setConn(false,'密碼錯誤'); document.getElementById('cal-wrap').innerHTML='<div class="err-box">密碼錯誤</div>'; return; }
    if (!res.ok) throw new Error(res.status);
    monthEventsCache = await res.json();
    if (!Array.isArray(monthEventsCache)) monthEventsCache = monthEventsCache.events || [];
    setConn(true, '已連線');
    renderMonthCalendar();
  } catch(e) {
    setConn(false,'連線失敗');
    document.getElementById('cal-wrap').innerHTML = `<div class="err-box">無法連線：${e.message}</div>`;
  }
}

// ===== RENDER MONTH CALENDAR =====
function renderMonthCalendar() {
  const y = curMonthDate.getFullYear();
  const mo = curMonthDate.getMonth();
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(y, mo, 1);
  const startDow = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
  const lastDate = new Date(y, mo + 1, 0).getDate();
  const totalCells = Math.ceil((startDow + lastDate) / 7) * 7;

  const hdrs = ['一','二','三','四','五','六','日'];
  let html = '<div class="month-day-hdrs">';
  hdrs.forEach(h => { html += `<div class="month-day-hdr">${h}</div>`; });
  html += '</div><div class="cal-grid">';

  for (let i = 0; i < totalCells; i++) {
    const dayN = i - startDow + 1;
    const date = new Date(y, mo, dayN);
    const isCurMonth = date.getMonth() === mo;
    const iso = fmtISO(date);
    const isToday = date.getTime() === today.getTime();
    const isPast = date < today;
    const rowIdx = Math.floor(i / 7);

    if (!isCurMonth) {
      html += `<div class="day-card other-month"><div class="day-num">${date.getDate()}</div></div>`;
    } else {
      const dayEvs = monthEventsCache.filter(e => e.date === iso);
      const hasEvs = dayEvs.length > 0;
      const isDone = isPast && !isToday;
      const cls = ['day-card', isToday ? 'today' : '', isDone && hasEvs ? 'done' : '', !hasEvs ? 'empty-day' : ''].filter(Boolean).join(' ');

      const evHtml = dayEvs.slice(0, 2).map(ev => `
        <span class="type-badge ${isDone ? 'b-done' : TYPE_BADGE[ev.type]||'b-single'}">${isDone ? '已發' : TYPE_LABEL[ev.type]||ev.type}</span>
        <div class="day-topic">${ev.topic}</div>`).join('');

      const moreHtml = dayEvs.length > 2 ? `<div style="font-size:10px;color:var(--text-muted)">+${dayEvs.length-2} 筆</div>` : '';
      const onclick = hasEvs ? `onclick="selectDay('${iso}',${rowIdx})"` : '';

      html += `<div class="${cls}" id="dc-${iso}" ${onclick}>
        <div class="day-num${isToday?' today-num':''}">${date.getDate()}${isToday?'<span class="today-pip"></span>':''}</div>
        ${evHtml}${moreHtml}
        ${hasEvs ? '<div class="acc-arrow">▾</div>' : ''}
      </div>`;
    }

    if ((i + 1) % 7 === 0) {
      html += `<div class="acc-wrap" data-row="${Math.floor(i / 7)}"></div>`;
    }
  }

  html += '</div>';
  document.getElementById('cal-wrap').innerHTML = html;
}

// ===== RENDER CALENDAR =====
function renderCalendar(ws) {
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '<div class="cal-grid">';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws.getTime() + i * 86400000);
    const iso = fmtISO(d);
    const isToday = d.getTime() === today.getTime();
    const isPast = d < today;
    const ev = eventsCache.find(e => e.date === iso);
    const dayName = DAY_NAMES[d.getDay()];
    if (!ev) {
      html += `<div class="day-card empty-day"><div class="day-name">${dayName}</div><div class="day-num">${d.getDate()}</div></div>`;
    } else {
      const isDone = isPast && !isToday;
      html += `<div class="day-card${isToday?' today':''}${isDone?' done':''}" id="dc-${iso}" onclick="selectDay('${iso}',0)">
        <div class="day-name">${dayName}</div>
        <div class="day-num${isToday?' today-num':''}">${d.getDate()}${isToday?'<span class="today-pip"></span>':''}</div>
        <span class="type-badge ${isDone?'b-done':TYPE_BADGE[ev.type]||'b-single'}">${isDone?'已發':TYPE_LABEL[ev.type]||ev.type}</span>
        <div class="day-topic">${ev.topic}</div>
        <div class="acc-arrow">▾</div>
      </div>`;
    }
  }
  html += '<div class="acc-wrap" data-row="0"></div>';
  html += '</div>';
  document.getElementById('cal-wrap').innerHTML = html;
}

// ===== SELECT DAY (unified: week + month) =====
function selectDay(iso, rowIdx) {
  const events = viewMode === 'month'
    ? monthEventsCache.filter(e => e.date === iso)
    : eventsCache.filter(e => e.date === iso);
  if (!events.length) return;

  if (selDate === iso) { closeAllAccordions(); return; }

  closeAllAccordions();
  selDate = iso;
  const dc = document.getElementById('dc-' + iso);
  if (dc) dc.classList.add('selected');

  const wrap = document.querySelector(`.acc-wrap[data-row="${rowIdx}"]`);
  if (!wrap) return;

  if (events.length === 1) {
    selEvent = events[0];
    generatedCaption = '';
    wrap.innerHTML = buildAccordionHTML(iso, events[0]);
  } else {
    selEvent = null;
    wrap.innerHTML = buildAccordionSelectorHTML(iso, events);
  }
  wrap.classList.add('open');
}

// ===== CLOSE ALL ACCORDIONS =====
function closeAllAccordions() {
  document.querySelectorAll('.acc-wrap').forEach(w => { w.classList.remove('open'); w.innerHTML = ''; });
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));

function switchPane(name, btn) {
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  if (btn) btn.classList.add('on');

  document.getElementById('pane-' + name).classList.add('on');
  const fc = document.getElementById('footer-caption');

  if (fi) fi.style.display = name === 'image' ? '' : 'none';

}

// ===== GENERATE CAPTION =====
async function genCaption() {
  if (!selEvent) return;
  const area = document.getElementById('caption-area');
  const btn  = document.getElementById('gen-caption-btn');
  area.textContent = '產出中…';
  if (btn) btn.disabled = true;
  try {
    const res = await fetch(API_BASE + CLAUDE_PROXY, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Basic ' + btoa(':' + pw),
      },
      body: JSON.stringify({
        system: SOP_SYSTEM,
        prompt: `主題：${selEvent.topic}\n系列：${selEvent.series||''}\n類型：${TYPE_LABEL[selEvent.type]}\n發文日期：${selDate}`,
        type: selEvent.type,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);

function copyCaption() {
  const text = document.getElementById('caption-area').textContent;
  navigator.clipboard.writeText(text).then(() => {

    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = '已複製！';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ===== PARSE SLIDES (keyword matching, no 第N張 dependency) =====
function parseSlides(text) {
  // Find all 標題： markers and their positions
  const titles = [...text.matchAll(/(?:^|\n)[^\S\n]*標題[：:]\s*(.+)/g)];
  if (!titles.length) return null;
  const slides = [];
  for (let i = 0; i < Math.min(titles.length, 10); i++) {
    const title = titles[i][1].trim();
    const blockStart = titles[i].index + titles[i][0].length;
    const blockEnd   = i + 1 < titles.length ? titles[i + 1].index : text.length;
    const block      = text.slice(blockStart, blockEnd);
    // Extract body after 正文：
    const bodyMatch  = block.match(/[^\S\n]*正文[：:]\s*([\s\S]+)/);
    let body = bodyMatch ? bodyMatch[1] : '';
    // Remove disclaimer lines and structural labels
    body = body.split('\n').filter(l => {
      const t = l.trim();
      return t && !/^[＊*]/.test(t) && !/^視覺建議[：:]/.test(t) && !/^第\s*\d+\s*張/.test(t);
    }).join('\n').trim();
    if (title) slides.push({ index: slides.length + 1, title, body });
  }
  return slides.length > 0 ? slides : null;
}

// ===== AUTO SHRINK BODY FONT SIZE =====
function fitBodyFontSize(bodyEl) {
  if (!bodyEl) return;
  // maxH: for flex:1 elements use clientHeight; for max-height elements use parseInt
  const styleMaxH = parseInt(bodyEl.style.maxHeight);
  const maxH = (styleMaxH > 0) ? styleMaxH : bodyEl.clientHeight;
  if (!maxH) return;
  const sizes = [28, 24, 20, 18];
  for (const sz of sizes) {
    bodyEl.style.fontSize = sz + 'px';
    bodyEl.style.lineHeight = '1.7';
    if (bodyEl.scrollHeight <= maxH) return; // fits
  }
  // At 18px overflow:hidden clips the rest
}

// ===== INIT IMAGE GRID PLACEHOLDERS =====
function initImgGrid() {
  const grid = document.getElementById('img-grid');
  if (!grid) return;
  if (grid.querySelector('.img-thumb-card.ready')) return; // already rendered
  if (!generatedCaption) {
    grid.innerHTML = '<div class="img-grid-msg">先切換回「文案」tab 產出文案，再回來生成圖片</div>';
    return;
  }
  const isCarousel = selEvent?.type === 'carousel';
  const slides = isCarousel ? parseSlides(generatedCaption) : [{ index: 1 }];
  if (!slides) {
    grid.innerHTML = '<div class="img-grid-msg">文案格式無法解析，請重新產出文案</div>';
    return;
  }
  grid.innerHTML = '';
  slides.forEach((_, i) => {
    const card = document.createElement('div');
    card.className = 'img-thumb-card';
    card.id = `thumb-${i}`;
    card.innerHTML = `<div class="img-thumb-placeholder">${i + 1}</div>`;
    grid.appendChild(card);
  });
}

// ===== GENERATE IMAGES (carousel + single/cta) =====
async function genImages() {
  if (!selEvent) return;
  const genBtn = document.getElementById('gen-image-btn');
  const zipBtn = document.getElementById('dl-zip-btn');
  const grid   = document.getElementById('img-grid');
  if (!grid) return;

  // Build slide list
  let slides;
  if (selEvent.type === 'carousel') {
    if (!generatedCaption) {
      grid.innerHTML = '<div class="img-grid-msg">請先產出文案，再生成圖片</div>'; return;
    }
    slides = parseSlides(generatedCaption);
    if (!slides) {
      grid.innerHTML = '<div class="img-grid-msg">文案格式無法解析，請重新產出文案</div>'; return;
    }
  } else {
    // single / cta: treat whole caption as the body of one slide
    const body = (generatedCaption || '')
      .split('\n').filter(l => !/^[＊*]/.test(l.trim())).join('\n').trim();
    slides = [{ index: 1, title: selEvent.topic, body }];
  }

  const total = slides.length;
  carouselCanvases = new Array(total).fill(null);

  // Show placeholder grid
  grid.innerHTML = '';
  slides.forEach((_, i) => {
    const card = document.createElement('div');
    card.className = 'img-thumb-card';
    card.id = `thumb-${i}`;
    card.innerHTML = `<div class="img-thumb-placeholder">${i + 1}</div>`;
    grid.appendChild(card);
  });

  if (genBtn) { genBtn.textContent = `生成中 0/${total}…`; genBtn.disabled = true; }
  if (zipBtn) zipBtn.style.display = 'none';

  await document.fonts.ready;
  const genWrap = document.getElementById('slide-gen-wrap');

  for (let i = 0; i < total; i++) {
    if (genBtn) genBtn.textContent = `生成中 ${i + 1}/${total}…`;
    const layout = i === 0 ? 'cover' : i === total - 1 && total > 1 ? 'outro' : 'content';
    genWrap.innerHTML = buildSlideDiv(slides[i], total, layout);
    await new Promise(r => setTimeout(r, 80)); // flush layout
    const bodyEl = genWrap.querySelector('.slide-body');
    fitBodyFontSize(bodyEl);
    await new Promise(r => setTimeout(r, 60)); // let font size settle

    const card = document.getElementById(`thumb-${i}`);
    try {
      const canvas = await html2canvas(genWrap.firstElementChild, {
        scale: 1, useCORS: true, backgroundColor: '#F5EFE5', logging: false,
      });
      carouselCanvases[i] = canvas;
      if (card) {
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/jpeg', 0.88);
        const numDiv = document.createElement('div');
        numDiv.className = 'img-thumb-num';
        numDiv.textContent = `${i + 1}/${total}`;
        const dlBtn2 = document.createElement('button');
        dlBtn2.className = 'img-thumb-dl';
        dlBtn2.textContent = '↓';
        const idx = i;
        dlBtn2.onclick = e => { e.stopPropagation(); downloadSingle(idx); };
        card.innerHTML = '';
        card.className = 'img-thumb-card ready';
        card.onclick = () => openLightbox(i);
        card.appendChild(img);
        card.appendChild(numDiv);
        card.appendChild(dlBtn2);
      }
    } catch (e) {
      carouselCanvases[i] = null;
      if (card) card.innerHTML = '<div class="img-thumb-placeholder" style="font-size:11px;color:#8A2010;white-space:nowrap">生成失敗</div>';
    }
  }

  genWrap.innerHTML = '';
  if (genBtn) { genBtn.textContent = '✦ 生成圖片'; genBtn.disabled = false; }
  if (zipBtn && carouselCanvases.some(Boolean)) zipBtn.style.display = '';
}

  const canvas = carouselCanvases[i];
  if (!canvas) return;
  const lb  = document.getElementById('carousel-lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = canvas.toDataURL('image/jpeg', 0.92);
  lb.classList.add('on');
}
function closeLightbox() {

}

// ===== DOWNLOAD SINGLE =====
function downloadSingle(i) {
  const canvas = carouselCanvases[i];
  if (!canvas) return;
  const topic = selEvent?.topic || '貼文';
  const a = document.createElement('a');
  a.download = `重心開始_${topic}_${String(i + 1).padStart(2, '0')}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ===== DOWNLOAD ALL AS ZIP =====
async function downloadZip() {
  if (!carouselCanvases.some(Boolean)) return;
  const btn  = document.getElementById('dl-zip-btn');
  const orig = btn.textContent;
  btn.textContent = '打包中…'; btn.disabled = true;
  try {
    const zip   = new JSZip();
    const topic = selEvent?.topic || '貼文';
    for (let i = 0; i < carouselCanvases.length; i++) {
      if (!carouselCanvases[i]) continue;
      const b64 = carouselCanvases[i].toDataURL('image/png').split(',')[1];
      zip.file(`重心開始_${topic}_${String(i + 1).padStart(2, '0')}.png`, b64, { base64: true });
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.download = `重心開始_${topic}.zip`;
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } finally {
    btn.textContent = orig; btn.disabled = false;
  }
}

// ===== INIT =====
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') loadData(); });
